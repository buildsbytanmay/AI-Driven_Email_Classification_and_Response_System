<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Email Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="landing-body">

    <canvas id="bgCanvas"></canvas>

    <div class="landing-container">

        <div class="hero-badge">
            <span>✦</span> Powered by AI
        </div>

        <img src="https://cdn-icons-png.flaticon.com/512/561/561127.png" class="hero-img" alt="Email">

        <h1 class="title">AI Email <span>Assistant</span></h1>

        <p class="subtitle"><span id="typing-text"></span></p>

        <button class="login-btn" onclick="goLogin()">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                    fill="#fff" opacity=".9" />
                <path
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                    fill="#fff" opacity=".9" />
                <path
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                    fill="#fff" opacity=".9" />
                <path
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                    fill="#fff" opacity=".9" />
            </svg>
            Continue with Google
        </button>

        <div class="features">
            <div class="feature-pill"><span>🔒</span> Secure OAuth</div>
            <div class="feature-pill"><span>⚡</span> Instant Classification</div>
            <div class="feature-pill"><span>🤖</span> AI Reply Generation</div>
        </div>

    </div>

    <script>
        function goLogin() { window.location.href = "/login"; }

        const phrases = [
            "Smartly classify your emails with AI.",
            "Generate professional replies in seconds.",
            "Stay organized. Reply faster."
        ];
        let pi = 0, ci = 0, deleting = false;

        function typeLoop() {
            const el = document.getElementById("typing-text");
            const phrase = phrases[pi];
            if (!deleting) {
                el.textContent = phrase.slice(0, ++ci);
                if (ci === phrase.length) { deleting = true; setTimeout(typeLoop, 1800); return; }
            } else {
                el.textContent = phrase.slice(0, --ci);
                if (ci === 0) { deleting = false; pi = (pi + 1) % phrases.length; }
            }
            setTimeout(typeLoop, deleting ? 35 : 55);
        }
        typeLoop();

        /* Particle canvas */
        const canvas = document.getElementById("bgCanvas");
        const ctx = canvas.getContext("2d");
        function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
        resize();
        window.addEventListener("resize", resize);

        const pts = Array.from({ length: 70 }, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.5 + .5,
            dx: (Math.random() - .5) * .4,
            dy: (Math.random() - .5) * .4
        }));

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pts.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(99,102,241,.5)";
                ctx.fill();
                p.x += p.dx; p.y += p.dy;
                if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
            });

            /* draw connecting lines */
            for (let i = 0; i < pts.length; i++) {
                for (let j = i + 1; j < pts.length; j++) {
                    const d = Math.hypot(pts[i].x - pts[j].x, pts[i].y - pts[j].y);
                    if (d < 100) {
                        ctx.beginPath();
                        ctx.moveTo(pts[i].x, pts[i].y);
                        ctx.lineTo(pts[j].x, pts[j].y);
                        ctx.strokeStyle = `rgba(99,102,241,${.15 * (1 - d / 100)})`;
                        ctx.lineWidth = .6;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>

</body>

</html>
