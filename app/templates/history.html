<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History — AI Email Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ── SVG Sprite ── -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
    <symbol id="ic-mail" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
    </symbol>
    <symbol id="ic-inbox" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 12h-6l-2 3H10l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>
    </symbol>
    <symbol id="ic-history" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/>
    </symbol>
    <symbol id="ic-logout" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
    </symbol>
    <symbol id="ic-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </symbol>
    <symbol id="ic-clipboard" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
    </symbol>
</svg>

<!-- ── Mobile Header ── -->
<div class="mobile-header">
    <div class="mh-brand">
        <div class="brand-icon"><svg width="18" height="18"><use href="#ic-mail"/></svg></div>
        AI Mail
    </div>
    <button class="hamburger-btn" onclick="openDrawer()"><svg width="22" height="22"><use href="#ic-menu"/></svg></button>
</div>

<!-- ── Drawer Overlay ── -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<!-- ── Drawer Sidebar (mobile) ── -->
<div class="drawer" id="drawer">
    <div>
        <div class="sidebar-brand">
            <div class="brand-icon"><svg width="18" height="18"><use href="#ic-mail"/></svg></div>
            <div><h2>AI Mail</h2><span>Smart Assistant</span></div>
        </div>
        <div class="sidebar-nav">
            <button onclick="goInbox()"><svg width="16" height="16"><use href="#ic-inbox"/></svg> Inbox</button>
            <button class="active"><svg width="16" height="16"><use href="#ic-history"/></svg> History</button>
        </div>
    </div>
    <div class="sidebar-footer">
        <button onclick="logout()"><svg width="16" height="16"><use href="#ic-logout"/></svg> Logout</button>
    </div>
</div>

<!-- ── Main Container ── -->
<div class="container">

    <!-- Desktop Sidebar -->
    <div class="sidebar">
        <div>
            <div class="sidebar-brand">
                <div class="brand-icon"><svg width="18" height="18"><use href="#ic-mail"/></svg></div>
                <div><h2>AI Mail</h2><span>Smart Assistant</span></div>
            </div>
            <div class="sidebar-nav">
                <button onclick="goInbox()"><svg width="16" height="16"><use href="#ic-inbox"/></svg> Inbox</button>
                <button class="active"><svg width="16" height="16"><use href="#ic-history"/></svg> History</button>
            </div>
        </div>
        <div class="sidebar-footer">
            <button id="logout-btn" onclick="logout()"><svg width="16" height="16"><use href="#ic-logout"/></svg> Logout</button>
        </div>
    </div>

    <!-- History Content -->
    <div class="history" id="historyList">
        <h3><svg width="18" height="18"><use href="#ic-history"/></svg> Reply History</h3>
        <div class="empty-state">
            <svg width="40" height="40" class="empty-icon"><use href="#ic-clipboard"/></svg>
            <p>Loading history…</p>
        </div>
    </div>

</div>

<script src="/static/script.js"></script>
<script>
function openDrawer() {
    document.getElementById('drawer').classList.add('open');
    document.getElementById('drawerOverlay').classList.add('open');
}
function closeDrawer() {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('drawerOverlay').classList.remove('open');
}

function logout() {
    document.cookie = "logged_in=; expires=Thu, 01 Jan 1970 00:00:00 UTC;";
    window.location.href = "/";
}

window.onload = function() {
    fetch("/history")
        .then(r => r.json())
        .then(data => {
            const container = document.getElementById("historyList");
            container.innerHTML = `<h3><svg width="18" height="18"><use href="#ic-history"/></svg> Reply History</h3>`;
            if (!data.length) {
                container.innerHTML += `<div class="empty-state"><svg width="40" height="40" class="empty-icon"><use href="#ic-clipboard"/></svg><p>No reply history yet.</p></div>`;
                return;
            }
            data.forEach(h => {
                const card = document.createElement("div");
                card.className = "history-card";
                card.innerHTML = `<strong>Email ID: ${h.email_id}</strong><p>${h.reply}</p>`;
                container.appendChild(card);
            });
        });
};
</script>

</body>
</html>
