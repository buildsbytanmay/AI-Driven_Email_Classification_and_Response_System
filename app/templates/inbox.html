<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox — AI Email Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ── SVG Sprite ── -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
    <symbol id="ic-mail" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
    </symbol>
    <symbol id="ic-inbox" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 12h-6l-2 3H10l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>
    </symbol>
    <symbol id="ic-star" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
    </symbol>
    <symbol id="ic-briefcase" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="12.01"/>
    </symbol>
    <symbol id="ic-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
    </symbol>
    <symbol id="ic-spam" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </symbol>
    <symbol id="ic-send" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </symbol>
    <symbol id="ic-history" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/>
    </symbol>
    <symbol id="ic-logout" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
    </symbol>
    <symbol id="ic-bot" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="15" x2="8" y2="15.01"/><line x1="16" y1="15" x2="16" y2="15.01"/>
    </symbol>
    <symbol id="ic-edit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
    </symbol>
    <symbol id="ic-arrow-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
    </symbol>
    <symbol id="ic-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </symbol>
</svg>

<!-- ── Mobile Header ── -->
<div class="mobile-header">
    <div class="mh-brand">
        <div class="brand-icon"><svg width="18" height="18"><use href="#ic-mail"/></svg></div>
        AI Mail
    </div>
    <button class="hamburger-btn" onclick="openDrawer()"><svg width="22" height="22"><use href="#ic-menu"/></svg></button>
</div>

<!-- ── Drawer Overlay ── -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<!-- ── Drawer Sidebar (mobile) ── -->
<div class="drawer" id="drawer">
    <div>
        <div class="sidebar-brand">
            <div class="brand-icon"><svg width="18" height="18"><use href="#ic-mail"/></svg></div>
            <div><h2>AI Mail</h2><span>Smart Assistant</span></div>
        </div>
        <div class="sidebar-nav">
            <button onclick="loadInbox();closeDrawer()" id="dnav-inbox"><svg width="16" height="16"><use href="#ic-inbox"/></svg> Inbox</button>
            <button onclick="filterEmails('Important');closeDrawer()" id="dnav-important"><svg width="16" height="16"><use href="#ic-star"/></svg> Important</button>
            <button onclick="filterEmails('Work');closeDrawer()" id="dnav-work"><svg width="16" height="16"><use href="#ic-briefcase"/></svg> Work</button>
            <button onclick="filterEmails('Personal');closeDrawer()" id="dnav-personal"><svg width="16" height="16"><use href="#ic-user"/></svg> Personal</button>
            <button onclick="filterEmails('Spam');closeDrawer()" id="dnav-spam"><svg width="16" height="16"><use href="#ic-spam"/></svg> Spam</button>
            <button onclick="loadSentEmails();closeDrawer()" id="dnav-sent"><svg width="16" height="16"><use href="#ic-send"/></svg> Sent</button>
            <button onclick="goHistory()" id="dnav-history"><svg width="16" height="16"><use href="#ic-history"/></svg> History</button>
        </div>
    </div>
    <div class="sidebar-footer">
        <button onclick="logout()"><svg width="16" height="16"><use href="#ic-logout"/></svg> Logout</button>
    </div>
</div>

<!-- ── Main Container ── -->
<div class="container">

    <!-- Desktop Sidebar -->
    <div class="sidebar">
        <div>
            <div class="sidebar-brand">
                <div class="brand-icon"><svg width="18" height="18"><use href="#ic-mail"/></svg></div>
                <div><h2>AI Mail</h2><span>Smart Assistant</span></div>
            </div>
            <div class="sidebar-nav">
                <button onclick="loadInbox()" id="nav-inbox"><svg width="16" height="16"><use href="#ic-inbox"/></svg> Inbox</button>
                <button onclick="filterEmails('Important')" id="nav-important"><svg width="16" height="16"><use href="#ic-star"/></svg> Important</button>
                <button onclick="filterEmails('Work')" id="nav-work"><svg width="16" height="16"><use href="#ic-briefcase"/></svg> Work</button>
                <button onclick="filterEmails('Personal')" id="nav-personal"><svg width="16" height="16"><use href="#ic-user"/></svg> Personal</button>
                <button onclick="filterEmails('Spam')" id="nav-spam"><svg width="16" height="16"><use href="#ic-spam"/></svg> Spam</button>
                <button onclick="loadSentEmails()" id="nav-sent"><svg width="16" height="16"><use href="#ic-send"/></svg> Sent</button>
                <button onclick="goHistory()" id="nav-history"><svg width="16" height="16"><use href="#ic-history"/></svg> History</button>
            </div>
        </div>
        <div class="sidebar-footer">
            <button id="logout-btn" onclick="logout()"><svg width="16" height="16"><use href="#ic-logout"/></svg> Logout</button>
        </div>
    </div>

    <!-- Email List -->
    <div class="email-list" id="emailListPanel">
        <div class="panel-header">
            <h3 id="listTitle"><svg width="15" height="15"><use href="#ic-inbox"/></svg> Inbox</h3>
        </div>
        <div class="email-list-body" id="emailList">
            <div class="empty-state">
                <svg width="40" height="40" class="empty-icon"><use href="#ic-inbox"/></svg>
                <p>Loading emails…</p>
            </div>
        </div>
    </div>

    <!-- Email Viewer -->
    <div class="email-viewer" id="emailViewer">

        <div class="viewer-placeholder" id="viewerPlaceholder">
            <div class="ph-icon"><svg width="52" height="52"><use href="#ic-mail"/></svg></div>
            <h4>No email selected</h4>
            <p>Select an email from the list to read it here.</p>
        </div>

        <div id="viewerContent" style="display:none; flex-direction:column; height:100%;">
            <div class="viewer-header">
                <button class="back-btn" onclick="closeViewer()">
                    <svg width="16" height="16"><use href="#ic-arrow-left"/></svg> Back
                </button>
                <h3 id="subject">Subject</h3>
                <div class="sender-row">
                    <div class="avatar" id="senderAvatar">?</div>
                    <span id="sender"></span>
                </div>
            </div>

            <div class="viewer-body">
                <div id="body"></div>
            </div>

            <div class="actions">
                <button class="btn-primary" id="generateBtn" onclick="generateReply()">
                    <svg width="15" height="15"><use href="#ic-bot"/></svg> AI Reply
                </button>
                <input type="text" id="customInput" placeholder="Custom instruction…">
                <button class="btn-secondary" id="customBtn" onclick="customReply()">
                    <svg width="15" height="15"><use href="#ic-edit"/></svg> Custom
                </button>
                <button class="btn-success" id="sendBtn" onclick="openGmailCompose()">
                    <svg width="15" height="15"><use href="#ic-send"/></svg> Send
                </button>
            </div>

            <div class="reply-section">
                <div class="reply-label">AI Generated Reply</div>
                <textarea id="replyBox" placeholder="AI reply will appear here…"></textarea>
            </div>
        </div>

    </div>

</div>

<div id="loader" class="loader hidden"></div>

<script src="/static/script.js"></script>
<script>
function openDrawer() {
    document.getElementById('drawer').classList.add('open');
    document.getElementById('drawerOverlay').classList.add('open');
}
function closeDrawer() {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('drawerOverlay').classList.remove('open');
}

function closeViewer() {
    document.getElementById('emailViewer').classList.remove('mobile-open');
}

function setActiveNav(id) {
    document.querySelectorAll('.sidebar-nav button, .drawer .sidebar-nav button').forEach(b => b.classList.remove('active'));
    ['nav-' + id, 'dnav-' + id].forEach(nid => {
        const el = document.getElementById(nid);
        if (el) el.classList.add('active');
    });
}

const _titleMap = {
    inbox:     { icon: '#ic-inbox',     label: 'Inbox' },
    important: { icon: '#ic-star',      label: 'Important' },
    work:      { icon: '#ic-briefcase', label: 'Work' },
    personal:  { icon: '#ic-user',      label: 'Personal' },
    spam:      { icon: '#ic-spam',      label: 'Spam' },
    sent:      { icon: '#ic-send',      label: 'Sent' },
};

function setPanelTitle(key) {
    const t = _titleMap[key] || { icon: '#ic-inbox', label: key };
    document.getElementById('listTitle').innerHTML =
        `<svg width="15" height="15"><use href="${t.icon}"/></svg> ${t.label}`;
}

const _origLoadInbox = loadInbox;
loadInbox = function() { setActiveNav('inbox'); setPanelTitle('inbox'); _origLoadInbox(); };

const _origFilter = filterEmails;
filterEmails = function(cat) {
    const map = { Important:'important', Work:'work', Personal:'personal', Spam:'spam' };
    const key = map[cat] || cat.toLowerCase();
    setActiveNav(key);
    setPanelTitle(key);
    _origFilter(cat);
};

const _origSent = loadSentEmails;
loadSentEmails = function() { setActiveNav('sent'); setPanelTitle('sent'); _origSent(); };

const _origOpen = openEmail;
openEmail = async function(id) {
    document.getElementById('viewerPlaceholder').style.display = 'none';
    document.getElementById('viewerContent').style.display = 'flex';
    document.getElementById('emailViewer').classList.add('mobile-open');
    await _origOpen(id);
    const s = document.getElementById('sender').innerText;
    document.getElementById('senderAvatar').textContent = (s[0] || '?').toUpperCase();
};
</script>
</body>
</html>
